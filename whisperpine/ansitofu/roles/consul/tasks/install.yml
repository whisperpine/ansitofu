- name: Install required dependencies
  ansible.builtin.apt:
    name: "{{ consul_dependencies }}"
    state: present
    update_cache: true
  no_log: true

- name: Create consul group
  ansible.builtin.group:
    name: "{{ consul_group }}"
    state: present

- name: Create consul user
  ansible.builtin.user:
    name: "{{ consul_user }}"
    group: "{{ consul_group }}"
    create_home: false
    shell: /usr/sbin/nologin
    system: true

- name: Download consul gpg key
  ansible.builtin.get_url:
    url: "{{ consul_gpg_url }}"
    dest: /tmp/consul.gpg
    mode: "0644"

- name: Convert consul gpg key to binary
  ansible.builtin.command:
    cmd: gpg --dearmor -o "{{ consul_key_file }}" /tmp/consul.gpg
    creates: "{{ consul_key_file }}"

- name: Add HashiCorp apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by={{ consul_key_file }}]
      {{ consul_repo_url }} {{ ansible_facts['distribution_release'] }} main
    state: present

- name: Install consul
  ansible.builtin.apt:
    name: consul
    state: present
  no_log: true

- name: Create consul directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ consul_user }}"
    group: "{{ consul_group }}"
    mode: "0755"
  loop:
    - "{{ consul_data_dir }}"
    - "{{ consul_config_dir }}"
