volumes:
  gitea-data:

services:
  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    restart: unless-stopped
    pull_policy: if_not_present
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:?}

  gitea:
    image: gitea/gitea:1.26.4-rootless
    restart: unless-stopped
    pull_policy: if_not_present
    volumes:
      - gitea-data:/var/lib/gitea
      - ./app.ini:/etc/gitea/app.ini:ro
      - /etc/timezone:/etc/timezone:ro

  # It's meant to be used for backup and restore.
  busybox:
    image: busybox:musl
    restart: "no"
    pull_policy: if_not_present
    volumes:
      # Shares the same volume with gitea.
      - gitea-data:/var/lib/gitea
      - ./backup:/backup
